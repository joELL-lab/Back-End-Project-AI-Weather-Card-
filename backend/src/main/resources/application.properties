# ==============================
# WeatherWise.ai - Backend Config
# ==============================

# Server
server.port=8080

# ==============================
# MySQL Database
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/weatherwise_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# JWT
# ==============================
jwt.secret=weatherwise_super_secret_key_that_is_at_least_256_bits_long_for_hs256_algorithm
jwt.expiration=86400000

